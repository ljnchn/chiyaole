<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>添加药品详情</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-primary": "#adc6ff",
                        "inverse-on-surface": "#f0f0f5",
                        "on-tertiary-container": "#fffbff",
                        "surface-container-highest": "#e2e2e7",
                        "secondary-container": "#6ffb85",
                        "primary-fixed-dim": "#adc6ff",
                        "surface-container": "#ededf2",
                        "on-primary-fixed": "#001a41",
                        "on-surface-variant": "#414755",
                        "secondary-fixed-dim": "#53e16f",
                        "on-primary-container": "#fefcff",
                        "tertiary": "#4c4aca",
                        "outline-variant": "#c1c6d7",
                        "background": "#f9f9fe",
                        "on-tertiary-fixed": "#0c006a",
                        "surface-bright": "#f9f9fe",
                        "error": "#ba1a1a",
                        "tertiary-container": "#6664e4",
                        "surface": "#f9f9fe",
                        "primary": "#0058bc",
                        "on-primary-fixed-variant": "#004493",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed-variant": "#3631b4",
                        "surface-container-high": "#e8e8ed",
                        "inverse-surface": "#2e3034",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-secondary-fixed": "#002107",
                        "on-background": "#1a1c1f",
                        "primary-fixed": "#d8e2ff",
                        "on-primary": "#ffffff",
                        "surface-container-low": "#f3f3f8",
                        "secondary-fixed": "#72fe88",
                        "on-secondary": "#ffffff",
                        "primary-container": "#0070eb",
                        "outline": "#717786",
                        "on-secondary-container": "#00732a",
                        "on-secondary-fixed-variant": "#00531c",
                        "surface-variant": "#e2e2e7",
                        "surface-tint": "#005bc1",
                        "error-container": "#ffdad6",
                        "surface-dim": "#d9dade",
                        "secondary": "#006e28",
                        "on-surface": "#1a1c1f",
                        "tertiary-fixed": "#e2dfff",
                        "tertiary-fixed-dim": "#c2c1ff",
                        "surface-container-lowest": "#ffffff"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9fe;
            -webkit-tap-highlight-color: transparent;
        }
        .header-font {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-background antialiased">
<!-- Top Navigation Bar (Shared Component Strategy) -->
<header class="fixed top-0 w-full z-50 bg-[#f9f9fe]/70 backdrop-blur-xl flex items-center justify-between px-4 h-14 w-full transition-opacity">
<button class="text-on-surface-variant font-medium text-sm px-2">取消</button>
<h1 class="font-headline font-bold text-lg tracking-tight text-primary">添加药品</h1>
<button class="bg-primary text-on-primary font-bold text-sm px-5 py-1.5 rounded-full shadow-sm active:scale-95 transition-transform">保存</button>
</header>
<main class="pt-20 pb-10 px-4 max-w-md mx-auto space-y-8">
<!-- Hero Visual Section -->
<section class="relative h-40 rounded-2xl overflow-hidden bg-surface-container-low mb-10 group">
<div class="absolute inset-0 bg-gradient-to-br from-primary/10 to-secondary/10 z-10"></div>
<img class="w-full h-full object-cover" data-alt="Close-up of clean, white medical pills and a glass of water on a serene blue surface with soft natural lighting and minimalist aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBdlEsNRoroX9jmmUyD2X2M2dt7BzVky2Qw5mnSiZS4-L1v7HR-q-WypA_qwF2PI888brXOAYNXrZDod9Tb24yMNncSdA1jxFWboHqOlPIOOeDAq--CK3FpUx8mKS8liY5dbcjZa6292XO-zM6EG6jEgjMYp7xGQj82BiYhe5TgAOeyv1KmhRq6ZRBhrZZSgHqHk-LrPd3bSLYzwK62EgS7-lz6Pu7TRZAM9OWRWDn6t9TWk_dWk8YUl8CjJSNq9krvc-B1aNXrHek"/>
<div class="absolute bottom-4 left-4 z-20 flex items-center space-x-3 bg-surface-container-lowest/80 backdrop-blur px-4 py-2 rounded-xl">
<span class="material-symbols-outlined text-primary" data-icon="medication">medication</span>
<span class="text-xs font-bold text-on-surface tracking-wider">药品档案配置</span>
</div>
</section>
<!-- Form Section -->
<div class="space-y-6">
<!-- Basic Info Card -->
<div class="bg-surface-container-lowest rounded-2xl p-5 space-y-6 shadow-sm">
<div class="space-y-2">
<label class="text-xs font-bold text-on-surface-variant/70 px-1 uppercase tracking-widest">药品名称</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" data-icon="label">label</span>
<input class="w-full bg-surface-container-high border-none rounded-xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline/60 text-on-surface font-medium" placeholder="例如：阿莫西林" type="text"/>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="text-xs font-bold text-on-surface-variant/70 px-1 uppercase tracking-widest">服用剂量</label>
<div class="relative flex items-center">
<input class="w-full bg-surface-container-high border-none rounded-xl py-4 px-4 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline/60 text-on-surface font-medium" placeholder="1 片 / 10ml" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="text-xs font-bold text-on-surface-variant/70 px-1 uppercase tracking-widest">服用频率</label>
<div class="relative flex items-center">
<select class="w-full bg-surface-container-high border-none rounded-xl py-4 px-4 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all text-on-surface font-medium appearance-none">
<option>1日3次</option>
<option>1日2次</option>
<option>1日1次</option>
<option>按需服用</option>
</select>
<span class="material-symbols-outlined absolute right-4 text-outline pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
</div>
<!-- Reminder Schedule Card -->
<div class="bg-surface-container-lowest rounded-2xl p-5 space-y-4 shadow-sm">
<div class="flex items-center justify-between mb-2">
<div class="flex items-center space-x-2">
<span class="material-symbols-outlined text-tertiary" data-icon="alarm">alarm</span>
<h3 class="font-headline font-bold text-on-surface">提醒时间设置</h3>
</div>
<button class="text-primary text-sm font-bold flex items-center">
<span class="material-symbols-outlined text-sm mr-1" data-icon="add_circle">add_circle</span>
                        添加时间点
                    </button>
</div>
<div class="flex flex-wrap gap-3">
<div class="bg-surface-container-high px-4 py-2.5 rounded-full flex items-center space-x-2 border border-transparent hover:border-primary/20 transition-colors">
<span class="text-sm font-bold text-on-surface">08:00</span>
<span class="material-symbols-outlined text-sm text-outline cursor-pointer" data-icon="close">close</span>
</div>
<div class="bg-surface-container-high px-4 py-2.5 rounded-full flex items-center space-x-2 border border-transparent">
<span class="text-sm font-bold text-on-surface">12:30</span>
<span class="material-symbols-outlined text-sm text-outline cursor-pointer" data-icon="close">close</span>
</div>
<div class="bg-surface-container-high px-4 py-2.5 rounded-full flex items-center space-x-2 border border-transparent">
<span class="text-sm font-bold text-on-surface">20:00</span>
<span class="material-symbols-outlined text-sm text-outline cursor-pointer" data-icon="close">close</span>
</div>
</div>
</div>
<!-- Inventory & Alert Card -->
<div class="bg-surface-container-lowest rounded-2xl p-5 space-y-5 shadow-sm">
<div class="flex items-center space-x-2 mb-2">
<span class="material-symbols-outlined text-secondary" data-icon="inventory_2">inventory_2</span>
<h3 class="font-headline font-bold text-on-surface">库存管理</h3>
</div>
<div class="space-y-4">
<div class="flex items-center justify-between">
<span class="text-sm text-on-surface-variant">剩余总量</span>
<div class="flex items-center space-x-2">
<input class="w-16 bg-surface-container-high border-none rounded-lg text-center py-2 font-bold text-primary" type="number" value="30"/>
<span class="text-xs font-medium text-outline">粒/支</span>
</div>
</div>
<div class="h-px bg-surface-container"></div>
<div class="space-y-3">
<div class="flex items-center justify-between">
<div class="flex flex-col">
<span class="text-sm font-bold text-on-surface">库存预警</span>
<span class="text-[10px] text-outline">库存低于阈值时发送通知</span>
</div>
<div class="w-10 h-5 bg-secondary/20 rounded-full relative p-0.5 flex items-center justify-end">
<div class="w-4 h-4 bg-secondary rounded-full shadow-sm"></div>
</div>
</div>
<div class="flex items-center space-x-4 bg-surface-container-low p-4 rounded-xl">
<span class="text-xs text-on-surface-variant whitespace-nowrap">当少于</span>
<div class="flex-grow flex items-center space-x-2">
<input class="w-full h-1.5 bg-secondary-container rounded-full appearance-none accent-secondary" max="50" min="1" type="range" value="5"/>
<span class="text-sm font-extrabold text-secondary min-w-[32px] text-right">5</span>
</div>
<span class="text-xs text-on-surface-variant">时提醒</span>
</div>
</div>
</div>
</div>
<!-- Advanced Notes (Optional/Implicit) -->
<div class="bg-surface-container-lowest rounded-2xl p-5 space-y-3 shadow-sm">
<label class="text-xs font-bold text-on-surface-variant/70 px-1 uppercase tracking-widest">备注事项</label>
<textarea class="w-full bg-surface-container-high border-none rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline/60 text-on-surface text-sm leading-relaxed" placeholder="例如：饭后服用，避免饮酒..." rows="3"></textarea>
</div>
</div>
<!-- Footer Help -->
<p class="text-center text-[11px] text-outline px-10 leading-relaxed">
            设置完成后，我们将按照设定的频率与时间为您推送提醒，请确保系统通知已开启。
        </p>
</main>
<!-- Success Feedback Overlay (Hidden by default) -->
<div class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 bg-inverse-surface text-inverse-on-surface px-6 py-3 rounded-full shadow-2xl z-[100] flex items-center space-x-3 transition-all" id="toast">
<span class="material-symbols-outlined text-secondary-fixed" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="text-sm font-medium tracking-wide">药品信息已保存</span>
</div>
</body></html>
