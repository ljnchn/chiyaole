</div>
</div>

<div class="pt-2 flex items-center justify-between"><div class="flex flex-col w-full gap-1.5"><div class="flex justify-between items-baseline"><span class="text-secondary font-bold text-xs font-headline">剩余 68 / 100 <span class="text-[10px] font-medium text-on-surface-variant">片</span></span><span class="text-on-surface-variant text-[10px] font-medium">68%</span></div><div class="h-1.5 w-full bg-surface-container rounded-full overflow-hidden"><div class="h-full bg-secondary rounded-full" style="width: 68%"></div></div></div></div>

</div>

<div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm border border-outline-variant/15 flex flex-col">
<div class="relative h-32 w-full bg-surface-container">
<img alt="Pills" class="w-full h-full object-cover" data-alt="Macro photography of red and white medical capsules scattered on a clean white surface with artistic soft focus and bright light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDMO4-Sitj4L83647OQIRlq3f0O29krIzXaVi20FKul5J_2graYOFCq0wZQJ4nhd4cHo-E2T9WbIze6vhdz22DP2b1po-85DpGFcEpwxSLfb7tsX_3GZnNAzLI4IZj2pku6t8wc-G4q6LJFxPOg10CPl5DLe_UszJWc149wfYnFXnYwVCmPJV97EI5j1VKDI2xo3RaBvf69Wd1uhZ2hpY11Lzbzc2q3DPG3f_Xdiu-WJ0qnMgyI9UFK0U4EuICUNyMNNDo8Lvnc78g"/>

<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-safe h-16 bg-[#f9f9fe]/70 backdrop-blur-xl z-50 rounded-t-2xl shadow-[0_-4px_24px_rgba(0,88,188,0.06)]">
<!-- Tab 1: Today -->
<div class="flex flex-col items-center justify-center text-[#414755] dark:text-slate-500 px-3 py-1 transition-opacity opacity-80 scale-90 duration-150 ease-out">

<!-- Tab 3: Med Management (Active) -->
<div class="flex flex-col items-center justify-center bg-[#0058bc]/10 dark:bg-blue-500/20 text-[#0058bc] dark:text-blue-300 rounded-xl px-3 py-1 scale-90 duration-150 ease-out">
